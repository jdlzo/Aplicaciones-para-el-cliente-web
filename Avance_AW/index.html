<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Empleados</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

  <div class="container">



    <div class="left">

      <div class="top-icons">
        <span>🔗</span>
        <span>💬</span>
        <span>⬇️</span>
      </div>



      <div class="calendar-card">

        <p>Select date</p>

        <div class="calendar-header">

          <h1 id="selected-date"></h1>

          <span>✏️</span>

        </div>

        <div class="month">

          <button id="prev-month" class="month-btn">
            ◀
          </button>

          <span id="month-year"></span>

          <button id="next-month" class="month-btn">
            ▶
          </button>

        </div>

        <div class="days">

          <span>D</span>
          <span>L</span>
          <span>M</span>
          <span>M</span>
          <span>J</span>
          <span>V</span>
          <span>S</span>

        </div>

        <div class="numbers" id="calendar-days"></div>

      </div>

    </div>



    <div class="center">

      <div class="search">

        <span>☰</span>

        <input type="text" placeholder="Buscar empleado"id="search-input">
        <span>🔍</span>

      </div>



      <div class="employee-list" id="employee-list">


        <div class="employee">

          <div class="employee-left">

            <div class="avatar">
              A
            </div>

            <span>Ariana</span>

          </div>

          <div class="employee-icons">

            <span class="edit-btn">
              ✏️
            </span>

            <span>
              ❗
            </span>

          </div>

        </div>


        <div class="employee">

          <div class="employee-left">

            <div class="avatar">
              C
            </div>

            <span>Carlos</span>

          </div>

          <div class="employee-icons">

            <span class="edit-btn">
              ✏️
            </span>

            <span>
              ❗
            </span>

          </div>

        </div>



        <div class="employee">

          <div class="employee-left">

            <div class="avatar">
              D
            </div>

            <span>David</span>

          </div>

          <div class="employee-icons">

            <span class="edit-btn">
              ✏️
            </span>

            <span>
              ❗
            </span>

          </div>

        </div>

      </div>

    </div>


    <div class="right">

      <div class="menu-container">

        <button class="settings-btn" id="settings-btn">
          ⚙
        </button>

        <div class="menu-card hidden" id="menu-card">

          <div class="menu-item">

            <span>Perfil</span>

            <span>👤</span>

          </div>

          <div class="menu-item">

            <span>Añadir empleado</span>

            <span>➕</span>

          </div>

          <div class="menu-item">

            <span>Ver registros</span>

            <span>📁</span>

          </div>

        </div>

      </div>

      <div class="circle-chart"></div>

    </div>

  </div>


  <div class="employee-modal hidden" id="employee-modal">

    <div class="modal-content">


      <div class="modal-header">

        <div class="profile-section">

          <div class="profile-image">
            👤
          </div>

          <div>

            <h2>Editar empleado</h2>

            <p>ID: EMP-102</p>

          </div>

        </div>

        <button class="close-btn" id="close-modal">
          ✖
        </button>

      </div>

      <!-- BODY -->

      <div class="modal-body">

        <!-- LEFT -->

        <div class="modal-left">

          <div class="input-group">

            <label>Nombre</label>

            <input type="text" value="Empleado1">

          </div>

          <div class="input-group">

            <label>Estado</label>

            <select>

              <option>Activo</option>

              <option>Inactivo</option>

            </select>

          </div>

          <div class="input-group">

            <label>Cédula</label>

            <input type="text" value="1312456789">

          </div>

          <div class="input-group">

            <label>Ocupación</label>

            <input type="text" value="Diseñador">

          </div>

          <!-- SWITCH -->

          <div class="switch-container">

            <span>Desactivar usuario</span>

            <label class="switch">

              <input type="checkbox">

              <span class="slider"></span>

            </label>

          </div>

        </div>

        <!-- RIGHT -->

        <div class="modal-right">

          <label>Observaciones</label>

          <textarea placeholder="Escribe una observación..."></textarea>

          <button class="save-btn">
            Guardar cambios
          </button>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
